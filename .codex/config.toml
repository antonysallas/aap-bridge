# =============================================================================
# aap-bridge - Codex MCP Server Configuration (Project-Scoped)
# =============================================================================
# AGENT_ROLE=codex tells MCP servers to look up CODEX_* API keys via get_agent_env().
# API keys (CODEX_PLANE_API_KEY, etc.) are forwarded from the shell via env_vars.
# See: mcp-shared/mcp_shared/config.py for credential resolution logic.

[mcp_servers.portreg]
command = "/home/asallas/.local/share/uv/tools/portreg/bin/portreg-mcp"

[mcp_servers.plane]
command = "uv"
args = ["--directory", "/home/asallas/workarea/projects/personal/ai-dev/mcp-servers/plane-mcp", "run", "plane-mcp"]
env = { AGENT_ROLE = "codex", PLANE_API_URL = "http://localhost:4004/api/v1", PLANE_WORKSPACE_SLUG = "ai-dev", PLANE_PROJECT_SLUG = "5a51c00b-824b-4117-ac17-1f5685c367af" }
env_vars = ["CODEX_PLANE_API_KEY", "PLANE_API_KEY"]
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.outline]
command = "uv"
args = ["--directory", "/home/asallas/workarea/projects/personal/ai-dev/mcp-servers/outline-mcp", "run", "outline-mcp"]
env = { AGENT_ROLE = "codex", OUTLINE_API_URL = "http://localhost:4003/api", OUTLINE_SPECS_COLLECTION_ID = "1311aed7-1f30-4cde-8d74-e6a4a4971dfd", OUTLINE_REVIEWS_COLLECTION_ID = "649bed3d-81f9-4af5-8b48-5cde887491da" }
env_vars = ["CODEX_OUTLINE_API_KEY", "OUTLINE_API_KEY"]
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.gitea]
command = "uv"
args = ["--directory", "/home/asallas/workarea/projects/personal/ai-dev/mcp-servers/gitea-mcp", "run", "gitea-mcp"]
env = { AGENT_ROLE = "codex", GITEA_API_URL = "http://localhost:4001/api/v1", GITEA_OWNER = "asallas", GITEA_DEFAULT_REPO = "aap-bridge" }
env_vars = ["CODEX_GITEA_TOKEN", "GITEA_TOKEN"]
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.workflow]
command = "uv"
args = ["--directory", "/home/asallas/workarea/projects/personal/ai-dev/mcp-servers/workflow-mcp", "run", "workflow-mcp"]
env = { AGENT_ROLE = "codex", PLANE_API_URL = "http://localhost:4004/api/v1", OUTLINE_API_URL = "http://localhost:4003/api", GITEA_API_URL = "http://localhost:4001/api/v1", PLANE_WORKSPACE_SLUG = "ai-dev", PLANE_PROJECT_SLUG = "5a51c00b-824b-4117-ac17-1f5685c367af", OUTLINE_SPECS_COLLECTION_ID = "1311aed7-1f30-4cde-8d74-e6a4a4971dfd", OUTLINE_REVIEWS_COLLECTION_ID = "649bed3d-81f9-4af5-8b48-5cde887491da", GITEA_OWNER = "asallas", GITEA_DEFAULT_REPO = "aap-bridge" }
env_vars = ["CODEX_PLANE_API_KEY", "CODEX_OUTLINE_API_KEY", "CODEX_GITEA_TOKEN", "PLANE_API_KEY", "OUTLINE_API_KEY", "GITEA_TOKEN"]
startup_timeout_sec = 30
tool_timeout_sec = 60

[mcp_servers.git]
command = "uv"
args = ["--directory", "/home/asallas/workarea/projects/personal/ai-dev/mcp-servers/git-mcp", "run", "git-mcp"]
env = { GIT_REPO_PATH = "." }